<!-- @dsCard group="Components" viewport="700x640" name="Data & display" subtitle="Cards, stats, badges, tags, avatars, table" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--surface-app); }
  .wrap { display: flex; flex-direction: column; gap: 20px; max-width: 660px; }
  .sub { font: var(--type-caption); text-transform: uppercase; letter-spacing: var(--tracking-caps); color: var(--text-muted); font-weight: 600; margin-bottom: 10px; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
const { Card, Badge, Tag, Avatar, AvatarGroup, StatCard, ProgressBar, Table } = window.ElohimSGEDesignSystem_956020;
const Users = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
const Cash = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2.5"/></svg>;

const columns = [
  { key: "codigo", header: "Código", mono: true, width: 92 },
  { key: "nombre", header: "Estudiante" },
  { key: "grado", header: "Grado", align: "center" },
  { key: "estado", header: "Estado", render: v => <Badge tone={v==="Activo"?"success":"neutral"} dot>{v}</Badge> },
  { key: "deuda", header: "Deuda", num: true, mono: true, render: v => `S/ ${v}` },
];
const rows = [
  { codigo: "E-1042", nombre: "María Quispe Roca", grado: "3° Prim", estado: "Activo", deuda: "0.00" },
  { codigo: "E-1043", nombre: "José Ramos Lía", grado: "5° Prim", estado: "Activo", deuda: "280.00" },
  { codigo: "E-1051", nombre: "Ana Flores M.", grado: "1° Sec", estado: "Retirado", deuda: "560.00" },
];

function Demo(){
  return (
    <React.Fragment>
      <div>
        <div className="sub">Stat cards</div>
        <div className="stats">
          <StatCard label="Estudiantes" value="482" icon={<Users/>} delta={4.2} caption="vs. 2025" />
          <StatCard label="Cobrado (Jun)" value="S/ 84,320" iconTone="success" icon={<Cash/>} delta={-2.1} caption="del mes" />
          <StatCard label="Morosidad" value="12.4%" iconTone="danger" icon={<Cash/>} delta={1.3} deltaDirection="up" />
        </div>
      </div>
      <div>
        <div className="sub">Badges, tags &amp; avatars</div>
        <Card>
          <div className="row" style={{marginBottom:14}}>
            <Badge tone="success" dot>Pagado</Badge>
            <Badge tone="warning" dot>Pendiente</Badge>
            <Badge tone="danger" dot>Vencido</Badge>
            <Badge tone="brand">Matriculado</Badge>
            <Badge tone="accent" solid>Becado</Badge>
            <Badge tone="neutral">Retirado</Badge>
          </div>
          <div className="row" style={{marginBottom:14}}>
            <Tag onRemove={()=>{}}>3° Primaria</Tag>
            <Tag selected leadingDot color="var(--gold-500)">Becados</Tag>
            <Tag onClick={()=>{}}>Turno mañana</Tag>
          </div>
          <div className="row" style={{justifyContent:"space-between"}}>
            <AvatarGroup max={4}>
              <Avatar name="María Quispe" color="var(--blue-500)" />
              <Avatar name="José Ramos" color="var(--gold-500)" />
              <Avatar name="Ana Flores" color="var(--green-500)" />
              <Avatar name="Luis Paz" />
              <Avatar name="Rosa Lima" />
              <Avatar name="Hugo Vela" />
            </AvatarGroup>
            <div style={{flex:1, maxWidth:240}}>
              <ProgressBar value={87} label="Asistencia hoy" showValue tone="success" />
            </div>
          </div>
        </Card>
      </div>
      <div>
        <div className="sub">Data table</div>
        <Card flush>
          <Table columns={columns} data={rows} hover zebra />
        </Card>
      </div>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
