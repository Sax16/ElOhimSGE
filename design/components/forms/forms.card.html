<!-- @dsCard group="Components" viewport="700x540" name="Forms" subtitle="Buttons, inputs, selects, checks, switches" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--surface-app); }
  .wrap { display: flex; flex-direction: column; gap: 22px; max-width: 660px; }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .sub { font: var(--type-caption); text-transform: uppercase; letter-spacing: var(--tracking-caps); color: var(--text-muted); font-weight: 600; margin-bottom: 10px; }
  .panel { background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 18px; }
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
const { Button, IconButton, Input, Select, Textarea, Checkbox, Radio, RadioGroup, Switch } = window.ElohimSGEDesignSystem_956020;
const Search = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
const Plus = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
const Trash = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>;

function Demo(){
  const [turno, setTurno] = React.useState("m");
  return (
    <React.Fragment>
      <div>
        <div className="sub">Buttons</div>
        <div className="panel">
          <div className="row" style={{marginBottom:12}}>
            <Button variant="primary" iconLeft={<Plus/>}>Nuevo</Button>
            <Button variant="accent">Matricular</Button>
            <Button variant="secondary">Cancelar</Button>
            <Button variant="ghost">Ver</Button>
            <Button variant="danger" iconLeft={<Trash/>}>Eliminar</Button>
          </div>
          <div className="row">
            <Button size="sm">Pequeño</Button>
            <Button size="md">Mediano</Button>
            <Button size="lg">Grande</Button>
            <Button disabled>Deshabilitado</Button>
            <IconButton label="Buscar" variant="outline"><Search/></IconButton>
            <IconButton label="Agregar" variant="solid"><Plus/></IconButton>
          </div>
        </div>
      </div>
      <div>
        <div className="sub">Inputs &amp; selects</div>
        <div className="panel grid2">
          <Input label="Nombre del estudiante" placeholder="María Quispe" iconLeft={<Search/>} />
          <Input label="Pensión" prefix="S/." defaultValue="280.00" />
          <Select label="Grado" placeholder="Seleccione" options={["1° Primaria","2° Primaria","3° Primaria"]} />
          <Input label="Correo" type="email" error="Correo no válido" defaultValue="abc@" />
        </div>
      </div>
      <div>
        <div className="sub">Selection controls</div>
        <div className="panel" style={{display:"flex", gap:40, flexWrap:"wrap"}}>
          <div style={{display:"flex", flexDirection:"column", gap:12}}>
            <Checkbox label="Becado" description="Exonera 50%" defaultChecked />
            <Checkbox indeterminate label="Seleccionar todos" />
            <Switch label="Pago en línea" defaultChecked />
          </div>
          <RadioGroup name="t" value={turno} onChange={e=>setTurno(e.target.value)}>
            <Radio value="m" label="Turno mañana" />
            <Radio value="t" label="Turno tarde" />
          </RadioGroup>
        </div>
      </div>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
