<!-- @dsCard group="Components" viewport="700x600" name="Feedback" subtitle="Alerts, toasts, dialog, tooltip, empty state" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--surface-app); }
  .wrap { display: flex; flex-direction: column; gap: 18px; max-width: 660px; }
  .sub { font: var(--type-caption); text-transform: uppercase; letter-spacing: var(--tracking-caps); color: var(--text-muted); font-weight: 600; margin-bottom: 8px; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .panel { background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 18px; }
  .grid2 { display: grid; grid-template-columns: 1.2fr 1fr; gap: 16px; align-items: start; }
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
const { Alert, Toast, Dialog, Tooltip, EmptyState, Button, IconButton } = window.ElohimSGEDesignSystem_956020;
const Inbox = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>;
const Plus = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
const Download = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
const Trash = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>;

function Demo(){
  const [open, setOpen] = React.useState(false);
  return (
    <React.Fragment>
      <div>
        <div className="sub">Alerts</div>
        <div className="col">
          <Alert tone="success" title="Matrícula registrada">El estudiante fue matriculado en 3° Primaria.</Alert>
          <Alert tone="warning" title="Pensión vencida" onClose={()=>{}}>Hay 2 cuotas pendientes de pago.</Alert>
          <Alert tone="danger" title="Error de validación">El número de DNI ya está registrado.</Alert>
        </div>
      </div>
      <div className="grid2">
        <div>
          <div className="sub">Toast &amp; dialog</div>
          <div className="col">
            <Toast tone="success" title="Pago registrado" message="S/ 280.00 · María Quispe" onClose={()=>{}} style={{position:"relative", width:"100%"}} />
            <Button variant="secondary" onClick={()=>setOpen(true)}>Abrir diálogo</Button>
            <div style={{display:"flex", gap:10, alignItems:"center"}}>
              <Tooltip content="Exportar a Excel"><IconButton label="Exportar" variant="outline"><Download/></IconButton></Tooltip>
              <span style={{font:"var(--type-caption)", color:"var(--text-muted)"}}>← pasa el cursor</span>
            </div>
          </div>
        </div>
        <div>
          <div className="sub">Empty state</div>
          <div className="panel" style={{padding:0}}>
            <EmptyState size="sm" icon={<Inbox/>} title="Sin estudiantes"
              description="Aún no hay matriculados en este grado."
              actions={<Button size="sm" iconLeft={<Plus/>}>Matricular</Button>} />
          </div>
        </div>
      </div>
      <Dialog open={open} onClose={()=>setOpen(false)} title="Eliminar estudiante"
        description="Esta acción no se puede deshacer." icon={<Trash/>} iconTone="danger"
        footer={<><Button variant="secondary" onClick={()=>setOpen(false)}>Cancelar</Button><Button variant="danger">Eliminar</Button></>}>
        ¿Seguro que deseas eliminar a <b>María Quispe</b> del registro?
      </Dialog>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
