<!-- @dsCard group="Colors" viewport="700x150" name="Semantic states" subtitle="Success, warning, danger, info — solid and soft" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{ margin:0; padding:20px; background:var(--surface-app); }
  .grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .item{ display:flex; flex-direction:column; gap:6px; }
  .solid{ height:46px; border-radius:var(--radius-md); display:flex; align-items:center; padding:0 12px; font:var(--type-label); font-weight:600; }
  .soft{ height:30px; border-radius:var(--radius-sm); display:flex; align-items:center; padding:0 12px; font:var(--type-caption); font-weight:600; }
  .name{ font:var(--type-caption); color:var(--text-muted); }
  .name b{ color:var(--text-strong); }
</style></head>
<body><div class="grid">
  <div class="item">
    <div class="solid" style="background:var(--success);color:var(--success-fg)">Success</div>
    <div class="soft" style="background:var(--success-soft);color:var(--success-soft-fg)">Pagado / Activo</div>
    <div class="name"><b>--success</b> · green-600</div>
  </div>
  <div class="item">
    <div class="solid" style="background:var(--warning);color:var(--warning-fg)">Warning</div>
    <div class="soft" style="background:var(--warning-soft);color:var(--warning-soft-fg)">Pendiente</div>
    <div class="name"><b>--warning</b> · amber-500</div>
  </div>
  <div class="item">
    <div class="solid" style="background:var(--danger);color:var(--danger-fg)">Danger</div>
    <div class="soft" style="background:var(--danger-soft);color:var(--danger-soft-fg)">Vencido / Error</div>
    <div class="name"><b>--danger</b> · red-600</div>
  </div>
  <div class="item">
    <div class="solid" style="background:var(--info);color:var(--info-fg)">Info</div>
    <div class="soft" style="background:var(--info-soft);color:var(--info-soft-fg)">Informativo</div>
    <div class="name"><b>--info</b> · blue-500</div>
  </div>
</div></body></html>
