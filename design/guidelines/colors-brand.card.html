<!-- @dsCard group="Colors" viewport="700x190" name="Brand · Blue & Gold" subtitle="Primary institutional blue and gold accent from the badge" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{ margin:0; padding:20px; background:var(--surface-app); }
  .group{ display:flex; flex-direction:column; gap:14px; }
  .ramp{ display:grid; grid-template-columns:repeat(11,1fr); border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-sm); }
  .sw{ height:58px; display:flex; align-items:flex-end; padding:6px; }
  .sw span{ font:var(--type-2xs); font-family:var(--font-mono); }
  .lbl{ display:flex; justify-content:space-between; align-items:baseline; gap:12px; font:var(--type-caption); color:var(--text-muted); white-space:nowrap; }
  .lbl b{ color:var(--text-strong); font-weight:600; }
</style></head>
<body><div class="group">
  <div>
    <div class="lbl"><b>Blue — primary</b><span>brand · acciones</span></div>
    <div class="ramp" style="margin-top:6px">
      <div class="sw" style="background:var(--blue-50)"><span style="color:#1a4c75">50</span></div>
      <div class="sw" style="background:var(--blue-100)"><span style="color:#1a4c75">100</span></div>
      <div class="sw" style="background:var(--blue-200)"><span style="color:#1a4c75">200</span></div>
      <div class="sw" style="background:var(--blue-300)"><span style="color:#15334d">300</span></div>
      <div class="sw" style="background:var(--blue-400)"><span style="color:#fff">400</span></div>
      <div class="sw" style="background:var(--blue-500)"><span style="color:#fff">500</span></div>
      <div class="sw" style="background:var(--blue-600)"><span style="color:#fff">600</span></div>
      <div class="sw" style="background:var(--blue-700)"><span style="color:#fff">700</span></div>
      <div class="sw" style="background:var(--blue-800)"><span style="color:#fff">800</span></div>
      <div class="sw" style="background:var(--blue-900)"><span style="color:#fff">900</span></div>
      <div class="sw" style="background:var(--blue-950)"><span style="color:#fff">950</span></div>
    </div>
  </div>
  <div>
    <div class="lbl"><b>Gold — accent</b><span>accent · énfasis</span></div>
    <div class="ramp" style="margin-top:6px">
      <div class="sw" style="background:var(--gold-50)"><span style="color:#82591c">50</span></div>
      <div class="sw" style="background:var(--gold-100)"><span style="color:#82591c">100</span></div>
      <div class="sw" style="background:var(--gold-200)"><span style="color:#66461a">200</span></div>
      <div class="sw" style="background:var(--gold-300)"><span style="color:#4f3817">300</span></div>
      <div class="sw" style="background:var(--gold-400)"><span style="color:#2a1c0d">400</span></div>
      <div class="sw" style="background:var(--gold-500)"><span style="color:#fff">500</span></div>
      <div class="sw" style="background:var(--gold-600)"><span style="color:#fff">600</span></div>
      <div class="sw" style="background:var(--gold-700)"><span style="color:#fff">700</span></div>
      <div class="sw" style="background:var(--gold-800)"><span style="color:#fff">800</span></div>
      <div class="sw" style="background:var(--gold-900)"><span style="color:#fff">900</span></div>
      <div class="sw" style="background:var(--brown-700)"><span style="color:#fff">brown</span></div>
    </div>
  </div>
</div></body></html>
