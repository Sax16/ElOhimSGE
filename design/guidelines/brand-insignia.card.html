<!-- @dsCard group="Brand" viewport="700x300" name="Insignia" subtitle="Colegio Cristocéntrico Elohim — the source of the whole palette" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{ margin:0; padding:24px; background:var(--surface-app); display:flex; gap:24px; align-items:center; }
  .badge{ width:200px; height:200px; flex-shrink:0; display:flex; align-items:center; justify-content:center; background:var(--surface-card); border:1px solid var(--border-subtle); border-radius:var(--radius-lg); box-shadow:var(--shadow-sm); }
  .badge img{ width:170px; height:170px; object-fit:contain; }
  .copy{ display:flex; flex-direction:column; gap:8px; }
  .name{ font:var(--type-h1); color:var(--text-strong); }
  .sub{ font:var(--type-body-md); color:var(--text-muted); max-width:330px; }
  .swatches{ display:flex; gap:8px; margin-top:8px; }
  .s{ width:34px; height:34px; border-radius:var(--radius-md); box-shadow:var(--shadow-xs); }
</style></head>
<body>
  <div class="badge"><img src="../assets/elohim-insignia.png" alt="Insignia Elohim" /></div>
  <div class="copy">
    <span class="eyebrow">Satipo · 2026</span>
    <span class="name">Elohim SGE</span>
    <span class="sub">Sistema de gestión escolar de la I.E.P. Elohim — Colegio Cristocéntrico. La paleta nace íntegramente de la insignia: el campo azul, el borde y banner dorados, la familia y el libro en marrón, y el lema en crema.</span>
    <div class="swatches">
      <div class="s" style="background:var(--blue-600)"></div>
      <div class="s" style="background:var(--blue-400)"></div>
      <div class="s" style="background:var(--gold-500)"></div>
      <div class="s" style="background:var(--brown-700)"></div>
      <div class="s" style="background:var(--cream-200)"></div>
    </div>
  </div>
</body></html>
