<!-- @dsCard group="Colors" viewport="700x170" name="Surfaces & text" subtitle="Elevation surfaces and the text hierarchy (light mode)" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{ margin:0; padding:20px; background:var(--surface-app); display:flex; gap:14px; }
  .col{ flex:1; display:flex; flex-direction:column; gap:8px; }
  .lbl{ font:var(--type-caption); text-transform:uppercase; letter-spacing:var(--tracking-caps); color:var(--text-muted); font-weight:600; }
  .surf{ display:flex; flex-direction:column; gap:6px; }
  .surf > div{ height:30px; border-radius:var(--radius-sm); border:1px solid var(--border-subtle); display:flex; align-items:center; padding:0 10px; font:var(--type-caption); color:var(--text-muted); }
  .text > div{ padding:2px 0; }
</style></head>
<body>
  <div class="col">
    <div class="lbl">Surfaces</div>
    <div class="surf">
      <div style="background:var(--surface-app)">surface-app</div>
      <div style="background:var(--surface-card)">surface-card</div>
      <div style="background:var(--surface-sunken)">surface-sunken</div>
      <div style="background:var(--surface-brand-soft);color:var(--info-soft-fg)">surface-brand-soft</div>
      <div style="background:var(--surface-accent-soft);color:var(--gold-700)">surface-accent-soft</div>
    </div>
  </div>
  <div class="col">
    <div class="lbl">Text hierarchy</div>
    <div class="text">
      <div style="font:var(--type-h2);color:var(--text-strong)">Texto fuerte — títulos</div>
      <div style="font:var(--type-body-md);color:var(--text-body)">Texto de cuerpo — contenido principal del SGE.</div>
      <div style="font:var(--type-body);color:var(--text-muted)">Texto atenuado — secundario, descripciones.</div>
      <div style="font:var(--type-caption);color:var(--text-subtle)">Texto sutil — placeholders, deshabilitado.</div>
      <div style="font:var(--type-body)"><a href="#">Texto de enlace — --text-link</a></div>
    </div>
  </div>
</body></html>
