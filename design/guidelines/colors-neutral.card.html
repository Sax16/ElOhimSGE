<!-- @dsCard group="Colors" viewport="700x190" name="Neutrals & Brown" subtitle="Cool blue-gray UI scaffolding and warm brown grounding" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{ margin:0; padding:20px; background:var(--surface-app); }
  .group{ display:flex; flex-direction:column; gap:14px; }
  .ramp{ display:grid; grid-template-columns:repeat(11,1fr); border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-sm); }
  .sw{ height:58px; display:flex; align-items:flex-end; padding:6px; }
  .sw span{ font:var(--type-2xs); font-family:var(--font-mono); }
  .lbl{ display:flex; justify-content:space-between; align-items:baseline; gap:12px; font:var(--type-caption); color:var(--text-muted); white-space:nowrap; }
  .lbl b{ color:var(--text-strong); font-weight:600; }
</style></head>
<body><div class="group">
  <div>
    <div class="lbl"><b>Neutral</b><span>texto, bordes, superficies</span></div>
    <div class="ramp" style="margin-top:6px">
      <div class="sw" style="background:var(--neutral-0);border:1px solid var(--border-subtle)"><span style="color:#28323c">0</span></div>
      <div class="sw" style="background:var(--neutral-50)"><span style="color:#28323c">50</span></div>
      <div class="sw" style="background:var(--neutral-100)"><span style="color:#28323c">100</span></div>
      <div class="sw" style="background:var(--neutral-200)"><span style="color:#28323c">200</span></div>
      <div class="sw" style="background:var(--neutral-300)"><span style="color:#28323c">300</span></div>
      <div class="sw" style="background:var(--neutral-400)"><span style="color:#fff">400</span></div>
      <div class="sw" style="background:var(--neutral-500)"><span style="color:#fff">500</span></div>
      <div class="sw" style="background:var(--neutral-600)"><span style="color:#fff">600</span></div>
      <div class="sw" style="background:var(--neutral-700)"><span style="color:#fff">700</span></div>
      <div class="sw" style="background:var(--neutral-800)"><span style="color:#fff">800</span></div>
      <div class="sw" style="background:var(--neutral-900)"><span style="color:#fff">900</span></div>
    </div>
  </div>
  <div>
    <div class="lbl"><b>Brown &amp; Cream</b><span>de la familia, el libro y el lema</span></div>
    <div class="ramp" style="margin-top:6px">
      <div class="sw" style="background:var(--cream-50)"><span style="color:#573a1c">cream50</span></div>
      <div class="sw" style="background:var(--cream-200)"><span style="color:#573a1c">cream200</span></div>
      <div class="sw" style="background:var(--brown-100)"><span style="color:#573a1c">100</span></div>
      <div class="sw" style="background:var(--brown-200)"><span style="color:#392611">200</span></div>
      <div class="sw" style="background:var(--brown-300)"><span style="color:#fff">300</span></div>
      <div class="sw" style="background:var(--brown-400)"><span style="color:#fff">400</span></div>
      <div class="sw" style="background:var(--brown-500)"><span style="color:#fff">500</span></div>
      <div class="sw" style="background:var(--brown-600)"><span style="color:#fff">600</span></div>
      <div class="sw" style="background:var(--brown-700)"><span style="color:#fff">700</span></div>
      <div class="sw" style="background:var(--brown-800)"><span style="color:#fff">800</span></div>
      <div class="sw" style="background:var(--brown-900)"><span style="color:#fff">900</span></div>
    </div>
  </div>
</div></body></html>
