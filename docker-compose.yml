services:
  postgres:
    image: postgres:16-alpine
    container_name: elohim-sge-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: elohim
      POSTGRES_PASSWORD: elohim
      POSTGRES_DB: elohim_sge
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U elohim -d elohim_sge']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
